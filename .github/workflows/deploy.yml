name: Deploy to Lambda

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: light-date-poll
  LAMBDA_FUNCTION: light-date-poll
  LAMBDA_ROLE: light-date-poll-lambda
  LAMBDA_TIMEOUT: 30
  LAMBDA_MEMORY: 256

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy Lambda function
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          IMAGE=$REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA
          ACCOUNT_ID=$(aws sts get-caller-identity \
            --query Account --output text)
          ROLE_ARN=arn:aws:iam::$ACCOUNT_ID:role/$LAMBDA_ROLE

          if aws lambda get-function \
               --function-name "$LAMBDA_FUNCTION" >/dev/null 2>&1; then
            echo "Function exists. Updating code..."
            aws lambda update-function-code \
              --function-name "$LAMBDA_FUNCTION" \
              --image-uri "$IMAGE"
          else
            echo "Function does not exist. Creating..."
            ENV_JSON=$(jq -n --arg url "$DATABASE_URL" \
              '{"Variables":{"AWS_LWA_PORT":"3000","DATABASE_URL":$url}}')
            aws lambda create-function \
              --function-name "$LAMBDA_FUNCTION" \
              --package-type Image \
              --code ImageUri="$IMAGE" \
              --role "$ROLE_ARN" \
              --timeout "$LAMBDA_TIMEOUT" \
              --memory-size "$LAMBDA_MEMORY" \
              --environment "$ENV_JSON"

            aws lambda wait function-active \
              --function-name "$LAMBDA_FUNCTION"

            aws lambda create-function-url-config \
              --function-name "$LAMBDA_FUNCTION" \
              --auth-type NONE

            aws lambda add-permission \
              --function-name "$LAMBDA_FUNCTION" \
              --statement-id FunctionURLAllowPublicAccess \
              --action lambda:InvokeFunctionUrl \
              --principal "*" \
              --function-url-auth-type NONE

            FUNCTION_URL=$(aws lambda get-function-url-config \
              --function-name "$LAMBDA_FUNCTION" \
              --query FunctionUrl --output text)
            echo "Function URL: $FUNCTION_URL"
          fi
